<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Sales Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2229;
    --border: #2a2f3a;
    --accent: #f5a623;
    --accent2: #ff6b35;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #f0f2f5;
    --muted: #6b7280;
    --label: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* HEADER */
  header {
    max-width: 960px;
    margin: 0 auto 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .date-tag {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* SUMMARY CARDS */
  .summary-grid {
    max-width: 960px;
    margin: 0 auto 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.cap::before { background: #4f8ef7; }
  .card.rev::before { background: var(--accent); }
  .card.pro::before { background: var(--green); }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .card.cap .card-value { color: #4f8ef7; }
  .card.rev .card-value { color: var(--accent); }
  .card.pro .card-value { color: var(--green); }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* SECTION */
  .section {
    max-width: 960px;
    margin: 0 auto 20px;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* PRODUCT ROW */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .product-card:hover { border-color: #3a3f4a; }

  .product-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    gap: 12px;
  }

  .product-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-green { background: rgba(46,204,113,0.15); color: var(--green); }
  .badge-yellow { background: rgba(245,166,35,0.15); color: var(--accent); }
  .badge-red { background: rgba(231,76,60,0.15); color: var(--red); }

  .product-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat { text-align: right; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
  .stat-value.profit { color: var(--green); }
  .stat-value.remaining { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 18px 14px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .progress-bar {
    height: 5px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  /* SOLD INPUT PANEL */
  .input-panel {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: none;
  }
  .input-panel.open { display: block; }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 100px;
  }
  .input-group label {
    font-size: 11px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    align-self: flex-end;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: var(--surface); color: var(--label); border: 1px solid var(--border); }
  .btn:hover { opacity: 0.85; }

  /* WHOLE CHICKEN PIECES */
  .pieces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  .piece-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .piece-item:hover { border-color: var(--accent); }
  .piece-item.sold {
    background: rgba(46,204,113,0.08);
    border-color: rgba(46,204,113,0.3);
  }
  .piece-item.sold .piece-price { color: var(--green); }
  .piece-item.sold .piece-label { color: var(--green); opacity: 0.7; }
  .piece-item.utang {
    background: rgba(255,165,0,0.10);
    border-color: rgba(255,165,0,0.4);
  }
  .piece-item.utang .piece-price { color: #f5a623; }
  .piece-item.utang .piece-label { color: #f5a623; opacity: 0.85; }
  .utang-tag {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 8px;
    color: #f5a623;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* PIECE MODAL */
  .piece-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .piece-modal-overlay.open { display: flex; }
  .piece-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px 18px;
    min-width: 240px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .piece-modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .piece-modal-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .piece-modal-btns { display: flex; gap: 10px; justify-content: center; }
  .pm-btn {
    flex: 1;
    padding: 11px 6px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pm-btn:hover { opacity: 0.85; }
  .pm-cash  { background: #4f8ef7; color: #fff; }
  .pm-sold { background: var(--green); color: #fff; }
  .pm-utang { background: #f5a623; color: #fff; }
  .piece-item.cash { background: rgba(79,142,247,0.10); border-color: rgba(79,142,247,0.35); }
  .piece-item.cash .piece-price { color: #4f8ef7; }
  .piece-item.cash .piece-label { color: #4f8ef7; opacity: 0.85; }
  .cash-tag { position: absolute; top: 4px; right: 5px; font-size: 8px; color: #4f8ef7; font-weight: 700; letter-spacing: 0.3px; }
  .pm-cancel { background: var(--surface2); color: var(--muted); font-size: 12px; margin-top: 12px; width: 100%; padding: 8px; border-radius: 8px; border: none; cursor: pointer; }
  .pm-reset { background: rgba(255,80,80,0.15); color: #ff5252; font-size: 12px; margin-top: 6px; width: 100%; padding: 8px; border-radius: 8px; border: none; cursor: pointer; }

  .piece-price {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .piece-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .sold-tag {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 9px;
    color: var(--green);
    font-weight: 600;
  }

  /* EXPENSES */
  .expense-list { padding: 0 18px 4px; }
  .expense-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-name { font-size: 13px; color: var(--text); flex: 1; }
  .expense-amount { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--red); }
  .expense-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0 4px; transition: color 0.15s;
  }
  .expense-del:hover { color: var(--red); }
  .expense-add {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .expense-add input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 7px 10px; outline: none; transition: border-color 0.2s;
  }
  .expense-add input:focus { border-color: var(--accent); }
  .expense-add input.exp-name { flex: 2; min-width: 120px; }
  .expense-add input.exp-amt  { flex: 1; min-width: 90px; }

  /* TOGGLE ARROW */
  .toggle-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .toggle-arrow.open { transform: rotate(180deg); }

  /* SPLITS */
  .split-list { padding: 0 18px 4px; }
  .split-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px;
  }
  .split-row:last-child { border-bottom: none; }
  .split-note { font-size: 13px; color: var(--text); flex: 1; }
  .split-amount { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: #a78bfa; }
  .split-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; transition: color 0.15s; }
  .split-del:hover { color: var(--red); }
  .split-add {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .split-add input {
    flex: 1; min-width: 100px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .split-add input:focus { border-color: #a78bfa; }
  .split-remaining-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px 12px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
  }
  .split-remaining-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .split-remaining-value { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); }

  /* APPLY BTNS */
  .apply-btns { display: flex; gap: 8px; flex-wrap: wrap; align-self: flex-end; }
  .btn-sold { background: var(--green); color: #fff; }
  .btn-utang-part { background: #f5a623; color: #000; }

  /* QUICK ENTRY */
  .quick-entry {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px 12px; border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .quick-entry-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .quick-kg {
    width: 80px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 6px 10px; font-size: 14px;
    font-family: 'Space Grotesk', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .quick-kg:focus { border-color: var(--accent); }
  .qbtn {
    padding: 6px 14px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .qbtn:hover { opacity: 0.85; }
  .qbtn-sold { background: var(--green); color: #fff; }
  .qbtn-utang { background: #f5a623; color: #000; }

  /* FOOTER NOTE */
  .footer-note {
    max-width: 960px;
    margin: 28px auto 0;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr; }
    .product-stats { gap: 12px; }
    .card-value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- PIECE STATUS MODAL -->
<div class="piece-modal-overlay" id="pieceModalOverlay" onclick="closePieceModal(event)">
  <div class="piece-modal">
    <div class="piece-modal-title" id="pieceModalTitle">Piece #1</div>
    <div class="piece-modal-sub" id="pieceModalSub">₱210.00 · 0.955 kg</div>
    <div class="piece-modal-btns" style="flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">
        <button class="pm-btn pm-cash" onclick="setPieceStatus('cash')" style="flex:1">💵 Cash</button>
        <button class="pm-btn pm-sold" onclick="setPieceStatus('sold')" style="flex:1">🏷️ Fixed</button>
      </div>
      <button class="pm-btn pm-utang" onclick="setPieceStatus('utang')" style="width:100%">📋 Utang</button>
    </div>
    <button class="pm-reset" id="pieceModalReset" onclick="setPieceStatus(null)" style="display:none">↩ Mark as Unsold</button>
    <button class="pm-cancel" onclick="closePieceModal()">Cancel</button>
  </div>
</div>

<header>
  <div class="logo">🐔 Chick<span>Track</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="date-tag" id="dateTag"></div>
    <button class="btn btn-ghost" style="font-size:11px;padding:4px 12px;" onclick="resetData()">Reset</button>
  </div>
</header>

<!-- SUMMARY CARDS -->
<div class="summary-grid">
  <div class="card cap">
    <div class="card-label">Total Capital</div>
    <div class="card-value" id="totalCap">—</div>
    <div class="card-sub" id="totalCapSub"></div>
  </div>
  <div class="card rev">
    <div class="card-label">Revenue (Sold)</div>
    <div class="card-value" id="totalRev">—</div>
    <div class="card-sub" id="totalRevSub"></div>
  </div>
  <div class="card pro">
    <div class="card-label">Profit (Sold)</div>
    <div class="card-value" id="totalPro">—</div>
    <div class="card-sub" id="totalProSub"></div>
  </div>
</div>

<!-- CHICKEN PARTS -->
<div class="section">
  <div class="section-title">Chicken Parts</div>
  <div id="parts-list"></div>
</div>

<!-- WHOLE CHICKEN -->
<div class="section">
  <div class="section-title">Whole Chicken — 15 pcs · 14.46 kg · Tap piece to toggle sold</div>
  <div id="whole-section"></div>
</div>

<div class="section">
  <div class="section-title">Expenses</div>
  <div id="expenses-section"></div>
</div>

<div class="section">
  <div class="section-title">Profit Split</div>
  <div id="splits-section"></div>
</div>

<div class="footer-note">Tap any part row to adjust · Tap piece to mark sold/utang · ☁️ Syncs across devices</div>

<script>
// ── DATA ──────────────────────────────────────────────
const parts = [
  { id:'head',  name:'Chicken Head', kg:10,   buyPkg:60,  sellPkg:80,  emoji:'🐔' },
  { id:'feet',  name:'Chicken Feet', kg:10,   buyPkg:95,  sellPkg:125, emoji:'🦶' },
  { id:'proven',name:'Proven',       kg:10,   buyPkg:95,  sellPkg:140, emoji:'🫀' },
  { id:'fat',   name:'Chicken Fat',  kg:3,    buyPkg:75,  sellPkg:100, emoji:'🧈' },
  { id:'isaw',  name:'Isaw',         kg:10,   buyPkg:105, sellPkg:140, emoji:'🍢' },
];

const wholePieces = [
  { kg:0.955, cost:147.00, sell:210.00 },
  { kg:0.891, cost:137.20, sell:196.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.864, cost:133.00, sell:190.00 },
  { kg:0.886, cost:136.50, sell:195.00 },
  { kg:0.977, cost:150.50, sell:215.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.955, cost:147.00, sell:210.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.977, cost:150.50, sell:215.00 },
];

const CASH_RATE = 180; // ₱/kg cash price for whole chicken

// ── FIREBASE SYNC ─────────────────────────────────────
const FB_URL = 'https://chicktracker-71f42-default-rtdb.asia-southeast1.firebasedatabase.app/data.json';

async function cloudLoad() {
  try {
    const res = await fetch(FB_URL);
    if (res.ok) {
      const data = await res.json();
      if (data) return data;
    }
  } catch(e) {}
  return null;
}

let saveTimer = null;
function saveState() {
  localStorage.setItem('chicktrack', JSON.stringify(state));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch(FB_URL, { method: 'PUT', body: JSON.stringify(state) }).catch(() => {});
  }, 800);
}

// ── STATE ─────────────────────────────────────────────
const defaultState = {
  parts: parts.map(p => ({ ...p, soldKg: 0, utangKg: 0 })),
  whole: { status: wholePieces.map(() => null) },
  expenses: [],
  splits: [],
};

let localSaved = null;
try { localSaved = JSON.parse(localStorage.getItem('chicktrack')); } catch(e) {}
const state = localSaved || JSON.parse(JSON.stringify(defaultState));

// ── HELPERS ───────────────────────────────────────────
const fmt = n => '₱' + Number(n).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtKg = n => Number(n).toFixed(2) + ' kg';

function soldBadge(pct) {
  if (pct >= 100) return ['Sold Out', 'badge-green'];
  if (pct >= 50)  return ['Selling', 'badge-yellow'];
  return ['Available', 'badge-red'];
}

// ── RENDER PARTS ──────────────────────────────────────
function renderParts() {
  const container = document.getElementById('parts-list');
  container.innerHTML = '';

  state.parts.forEach((p, idx) => {
    const utangKg = p.utangKg || 0;
    const capital = p.kg * p.buyPkg;
    const soldRev = p.soldKg * p.sellPkg;
    const soldProfit = p.soldKg * (p.sellPkg - p.buyPkg);
    const doneKg = p.soldKg + utangKg;
    const remaining = Math.max(0, p.kg - doneKg);
    const pct = Math.min(100, (doneKg / p.kg) * 100);
    const [label, badgeClass] = soldBadge(pct);
    const utangStat = utangKg > 0
      ? `<div class="stat"><div class="stat-label">Utang</div><div class="stat-value" style="color:#f5a623">${fmtKg(utangKg)}</div></div>`
      : '';

    const div = document.createElement('div');
    div.className = 'product-card';
    div.innerHTML = `
      <div class="product-header" onclick="togglePanel('panel-${p.id}', this)">
        <div class="product-name">
          <span>${p.emoji}</span>
          ${p.name}
          <span class="badge ${badgeClass}">${label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px">
          <div class="product-stats">
            <div class="stat"><div class="stat-label">Profit</div><div class="stat-value profit">${fmt(soldProfit)}</div></div>
            <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value remaining">${fmtKg(remaining)}</div></div>
            <div class="stat"><div class="stat-label">Sold</div><div class="stat-value">${fmtKg(p.soldKg)}</div></div>
            ${utangStat}
          </div>
          <div class="toggle-arrow" id="arrow-${p.id}">▼</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>${fmtKg(p.soldKg)} sold${utangKg > 0 ? ` · ${fmtKg(utangKg)} utang` : ''} of ${fmtKg(p.kg)}</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="quick-entry">
        <span class="quick-entry-label">Quick add:</span>
        <input class="quick-kg" id="qkg-${p.id}" type="number" min="0" step="1" placeholder="₱ amount">
        <button class="qbtn qbtn-sold" onclick="quickAddPart('${p.id}','sold')">✓ Sold</button>
        <button class="qbtn qbtn-utang" onclick="quickAddPart('${p.id}','utang')">📋 Utang</button>
      </div>
      <div class="input-panel" id="panel-${p.id}">
        <div class="input-row">
          <div class="input-group">
            <label>Sold (kg)</label>
            <input type="number" id="sold-${p.id}" value="${p.soldKg}" min="0" step="0.1" placeholder="0.00">
          </div>
          <div class="input-group">
            <label>Utang (kg)</label>
            <input type="number" id="utang-${p.id}" value="${utangKg}" min="0" step="0.1" placeholder="0.00">
          </div>
          <div class="input-group">
            <label>Buy/kg</label>
            <input type="number" id="buy-${p.id}" value="${p.buyPkg}" min="0" step="1">
          </div>
          <div class="input-group">
            <label>Sell/kg</label>
            <input type="number" id="sell-${p.id}" value="${p.sellPkg}" min="0" step="1">
          </div>
          <div class="input-group">
            <label>Total kg</label>
            <input type="number" id="total-${p.id}" value="${p.kg}" min="0" step="0.1">
          </div>
          <div class="apply-btns">
            <button class="btn btn-sold" onclick="updatePart('${p.id}')">✓ Apply</button>
            <button class="btn btn-ghost" onclick="togglePanel('panel-${p.id}')">Close</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── RENDER WHOLE CHICKEN ──────────────────────────────
function renderWhole() {
  const container = document.getElementById('whole-section');
  const status = getWholeStatus();
  const soldCount = status.filter(s => s === 'sold' || s === 'cash').length;
  const utangCount = status.filter(s => s === 'utang').length;
  const cashCount = status.filter(s => s === 'cash').length;
  const doneCount = soldCount + utangCount;
  const totalCount = wholePieces.length;
  const pieceRev = (p, s) => s === 'cash' ? p.kg * CASH_RATE : s === 'sold' ? p.sell : 0;
  const soldRev = wholePieces.reduce((a, p, i) => a + pieceRev(p, status[i]), 0);
  const utangRev = wholePieces.reduce((a, p, i) => a + (status[i] === 'utang' ? p.sell : 0), 0);
  const soldProfit = wholePieces.reduce((a, p, i) => {
    const s = status[i];
    if (s === 'sold') return a + p.sell - p.cost;
    if (s === 'cash') return a + p.kg * CASH_RATE - p.cost;
    return a;
  }, 0);
  const soldKg = wholePieces.reduce((a, p, i) => a + (status[i] !== null ? p.kg : 0), 0);
  const remainingKg = wholePieces.reduce((a, p, i) => a + (status[i] === null ? p.kg : 0), 0);
  const pct = Math.min(100, (doneCount / totalCount) * 100);
  const [label, badgeClass] = soldBadge(pct);

  const pieceTiles = wholePieces.map((p, i) => {
    const s = status[i];
    const cls = s === 'sold' ? 'sold' : s === 'utang' ? 'utang' : s === 'cash' ? 'cash' : '';
    const tag = s === 'sold' ? '<span class="sold-tag">✓</span>'
              : s === 'utang' ? '<span class="utang-tag">UTANG</span>'
              : s === 'cash' ? '<span class="cash-tag">CASH</span>' : '';
    const dispPrice = s === 'cash' ? p.kg * CASH_RATE : p.sell;
    const dispProfit = s === 'cash' ? p.kg * CASH_RATE - p.cost : p.sell - p.cost;
    const profColor = s === 'sold' ? 'var(--green)' : s === 'utang' ? '#f5a623' : s === 'cash' ? '#4f8ef7' : 'var(--accent)';
    return `
    <div class="piece-item ${cls}" onclick="openPieceModal(${i})">
      ${tag}
      <div class="piece-price">${fmt(dispPrice)}</div>
      <div class="piece-label">#${i+1} · ${p.kg}kg</div>
      <div class="piece-label" style="color:${profColor}">+${fmt(dispProfit)}</div>
    </div>`;
  }).join('');

  const utangLine = utangCount > 0 ? `<div class="stat"><div class="stat-label">Utang</div><div class="stat-value" style="color:#f5a623">${utangCount} pcs · ${fmt(utangRev)}</div></div>` : '';

  container.innerHTML = `
    <div class="product-card">
      <div class="product-header">
        <div class="product-name">🐓 Whole Chicken <span class="badge ${badgeClass}">${label}</span></div>
        <div class="product-stats">
          <div class="stat"><div class="stat-label">Profit</div><div class="stat-value profit">${fmt(soldProfit)}</div></div>
          <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value remaining">${totalCount - doneCount} pcs · ${fmtKg(remainingKg)}</div></div>
          <div class="stat"><div class="stat-label">Sold</div><div class="stat-value">${soldCount} pcs</div></div>
          ${cashCount > 0 ? `<div class="stat"><div class="stat-label">Cash</div><div class="stat-value" style="color:#4f8ef7">${cashCount} pcs</div></div>` : ''}
          ${utangLine}
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>${soldCount - cashCount} fixed · ${cashCount} cash · ${utangCount} utang · ${totalCount - doneCount} remaining</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="pieces-grid">${pieceTiles}</div>
    </div>
  `;
}

// ── RENDER SUMMARY ────────────────────────────────────
function renderSummary() {
  // Parts
  const partsCap = state.parts.reduce((a,p) => a + p.kg * p.buyPkg, 0);
  const partsSoldRev = state.parts.reduce((a,p) => a + p.soldKg * p.sellPkg, 0);
  const partsSoldProfit = state.parts.reduce((a,p) => a + p.soldKg * (p.sellPkg - p.buyPkg), 0);

  // Whole
  const wst = getWholeStatus();
  const wholeCap = wholePieces.reduce((a,p) => a + p.cost, 0);
  const wholeSoldRev = wholePieces.reduce((a,p,i) => {
    const s = wst[i];
    return a + (s === 'sold' ? p.sell : s === 'cash' ? p.kg * CASH_RATE : 0);
  }, 0);
  const wholeSoldProfit = wholePieces.reduce((a,p,i) => {
    const s = wst[i];
    if (s === 'sold') return a + p.sell - p.cost;
    if (s === 'cash') return a + p.kg * CASH_RATE - p.cost;
    return a;
  }, 0);
  const totalPotentialRevWhole = wholePieces.reduce((a,p) => a + p.sell, 0);

  const totalCap = partsCap + wholeCap;
  const totalRev = partsSoldRev + wholeSoldRev;
  const totalProfit = partsSoldProfit + wholeSoldProfit;

  const totalPotentialRev = state.parts.reduce((a,p) => a + p.kg * p.sellPkg, 0) + totalPotentialRevWhole;

  const totalExpenses = (state.expenses || []).reduce((a, e) => a + e.amount, 0);
  const totalSplits = (state.splits || []).reduce((a, s) => a + s.amount, 0);
  const netProfit = totalProfit - totalExpenses;
  const unsplitProfit = netProfit - totalSplits;

  document.getElementById('totalCap').textContent = fmt(totalCap);
  document.getElementById('totalCapSub').textContent = 'All items · 57.46 kg';
  document.getElementById('totalRev').textContent = fmt(totalRev);
  document.getElementById('totalRevSub').textContent = `of ${fmt(totalPotentialRev)} potential`;
  document.getElementById('totalPro').textContent = fmt(unsplitProfit);
  let proSub = '';
  if (totalExpenses > 0 || totalSplits > 0) {
    const parts2 = [];
    if (totalExpenses > 0) parts2.push(`Exp −₱${totalExpenses.toFixed(2)}`);
    if (totalSplits > 0) parts2.push(`Split −₱${totalSplits.toFixed(2)}`);
    proSub = `Gross ₱${totalProfit.toFixed(2)} · ${parts2.join(' · ')}`;
  } else {
    proSub = unsplitProfit > 0 ? '↑ Based on sold items' : 'No sales yet';
  }
  document.getElementById('totalProSub').textContent = proSub;
}

function renderExpenses() {
  const container = document.getElementById('expenses-section');
  const expenses = state.expenses || [];
  const total = expenses.reduce((a, e) => a + e.amount, 0);

  const rows = expenses.length
    ? expenses.map((e, i) => `
        <div class="expense-row">
          <span class="expense-name">${e.name}</span>
          <span class="expense-amount">−${fmt(e.amount)}</span>
          <button class="expense-del" onclick="deleteExpense(${i})">×</button>
        </div>`).join('')
    : '<div style="padding:10px 0;font-size:12px;color:var(--muted);">No expenses yet</div>';

  container.innerHTML = `
    <div class="product-card">
      <div class="product-header" style="cursor:default">
        <div class="product-name">💸 Expenses</div>
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value" style="color:var(--red)">${fmt(total)}</div>
        </div>
      </div>
      <div class="expense-list">${rows}</div>
      <div class="expense-add">
        <input class="exp-name" id="exp-name" type="text" placeholder="Expense name (e.g. Transport)">
        <input class="exp-amt"  id="exp-amt"  type="number" placeholder="Amount" min="0" step="1">
        <button class="btn btn-primary" style="padding:7px 14px" onclick="addExpense()">Add</button>
      </div>
    </div>
  `;
}

function renderSplits() {
  const container = document.getElementById('splits-section');
  const splits = state.splits || [];
  const totalSplits = splits.reduce((a, s) => a + s.amount, 0);

  // compute current net profit for remaining display
  const partsSoldProfit = state.parts.reduce((a,p) => a + p.soldKg * (p.sellPkg - p.buyPkg), 0);
  const wst2 = getWholeStatus();
  const wholeSoldProfit = wholePieces.reduce((a,p,i) => {
    const s = wst2[i];
    if (s === 'sold') return a + p.sell - p.cost;
    if (s === 'cash') return a + p.kg * CASH_RATE - p.cost;
    return a;
  }, 0);
  const totalExpenses = (state.expenses || []).reduce((a, e) => a + e.amount, 0);
  const netProfit = partsSoldProfit + wholeSoldProfit - totalExpenses;
  const remaining = netProfit - totalSplits;

  const rows = splits.length
    ? splits.map((s, i) => `
        <div class="split-row">
          <span class="split-note">${s.note || 'Split'}</span>
          <span class="split-amount">−${fmt(s.amount)}</span>
          <button class="split-del" onclick="deleteSplit(${i})">×</button>
        </div>`).join('')
    : '<div style="padding:10px 0;font-size:12px;color:var(--muted);">No splits recorded yet</div>';

  container.innerHTML = `
    <div class="product-card">
      <div class="product-header" style="cursor:default">
        <div class="product-name">🤝 Profit Split</div>
        <div class="stat">
          <div class="stat-label">Total Split</div>
          <div class="stat-value" style="color:#a78bfa">${fmt(totalSplits)}</div>
        </div>
      </div>
      <div class="split-list">${rows}</div>
      <div class="split-remaining-bar">
        <div>
          <div class="split-remaining-label">Remaining (Unsplit)</div>
          <div class="split-remaining-value">${fmt(Math.max(0, remaining))}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);text-align:right">
          Net ₱${netProfit.toFixed(2)}<br>Split ₱${totalSplits.toFixed(2)}
        </div>
      </div>
      <div class="split-add">
        <input id="split-note" type="text" placeholder="Note (e.g. Week 1 split)">
        <input id="split-amt" type="number" placeholder="Amount" min="0" step="1">
        <button class="btn btn-primary" style="padding:7px 14px;background:#a78bfa;color:#fff" onclick="addSplit()">Record Split</button>
      </div>
    </div>
  `;
}

function render() {
  renderParts();
  renderWhole();
  renderExpenses();
  renderSplits();
  renderSummary();
}

// ── INTERACTIONS ──────────────────────────────────────
function addExpense() {
  const name = document.getElementById('exp-name').value.trim();
  const amount = parseFloat(document.getElementById('exp-amt').value) || 0;
  if (!name || amount <= 0) return;
  if (!state.expenses) state.expenses = [];
  state.expenses.push({ name, amount });
  saveState();
  renderExpenses();
  renderSummary();
}

function deleteExpense(i) {
  state.expenses.splice(i, 1);
  saveState();
  renderExpenses();
  renderSummary();
}

function addSplit() {
  const note = document.getElementById('split-note').value.trim();
  const amount = parseFloat(document.getElementById('split-amt').value) || 0;
  if (amount <= 0) return;
  if (!state.splits) state.splits = [];
  state.splits.push({ note: note || 'Split', amount });
  saveState();
  renderSplits();
  renderSummary();
}

function deleteSplit(i) {
  state.splits.splice(i, 1);
  saveState();
  renderSplits();
  renderSummary();
}

function togglePanel(id, headerEl) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.contains('open');
  // Close all panels
  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.toggle-arrow').forEach(a => a.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    const arrowId = id.replace('panel-', 'arrow-');
    const arrow = document.getElementById(arrowId);
    if (arrow) arrow.classList.add('open');
  }
}

function quickAddPart(id, type) {
  const idx = state.parts.findIndex(p => p.id === id);
  if (idx === -1) return;
  const amount = parseFloat(document.getElementById('qkg-'+id).value) || 0;
  if (amount <= 0) return;
  const p = state.parts[idx];
  if (!p.sellPkg) return;
  const kg = amount / p.sellPkg;
  const avail = Math.max(0, p.kg - p.soldKg - (p.utangKg || 0));
  const add = Math.min(kg, avail);
  if (type === 'sold') p.soldKg += add;
  else p.utangKg = (p.utangKg || 0) + add;
  document.getElementById('qkg-'+id).value = '';
  saveState();
  renderParts();
  renderSummary();
}

function updatePart(id) {
  const idx = state.parts.findIndex(p => p.id === id);
  if (idx === -1) return;
  const soldKg = parseFloat(document.getElementById('sold-'+id).value) || 0;
  const utangKg = parseFloat(document.getElementById('utang-'+id).value) || 0;
  const buyPkg = parseFloat(document.getElementById('buy-'+id).value) || 0;
  const sellPkg = parseFloat(document.getElementById('sell-'+id).value) || 0;
  const totalKg = parseFloat(document.getElementById('total-'+id).value) || 0;
  state.parts[idx].soldKg = Math.min(soldKg, totalKg);
  state.parts[idx].utangKg = Math.min(utangKg, Math.max(0, totalKg - soldKg));
  state.parts[idx].buyPkg = buyPkg;
  state.parts[idx].sellPkg = sellPkg;
  state.parts[idx].kg = totalKg;
  saveState();
  render();
  setTimeout(() => togglePanel('panel-'+id), 10);
}

function getWholeStatus() {
  // migrate old boolean sold array
  if (state.whole.sold && !state.whole.status) {
    state.whole.status = state.whole.sold.map(v => v ? 'sold' : null);
    delete state.whole.sold;
  }
  if (!state.whole.status) state.whole.status = wholePieces.map(() => null);
  return state.whole.status;
}

let _modalIdx = null;
function openPieceModal(i) {
  _modalIdx = i;
  const p = wholePieces[i];
  const s = getWholeStatus()[i];
  document.getElementById('pieceModalTitle').textContent = `Piece #${i+1}`;
  const cashPrice = p.kg * CASH_RATE;
  document.getElementById('pieceModalSub').textContent = `${p.kg} kg · Fixed ${fmt(p.sell)} · Cash ${fmt(cashPrice)}`;
  document.getElementById('pieceModalReset').style.display = s ? 'block' : 'none';
  document.getElementById('pieceModalOverlay').classList.add('open');
}
function closePieceModal(e) {
  if (e && e.target !== document.getElementById('pieceModalOverlay')) return;
  document.getElementById('pieceModalOverlay').classList.remove('open');
  _modalIdx = null;
}
function setPieceStatus(s) {
  if (_modalIdx === null) return;
  getWholeStatus();
  state.whole.status[_modalIdx] = s;
  document.getElementById('pieceModalOverlay').classList.remove('open');
  _modalIdx = null;
  saveState(); renderWhole(); renderSummary();
}

function resetData() {
  if (!confirm('Reset all sales data back to zero?')) return;
  state.parts = parts.map(p => ({ ...p, soldKg: 0, utangKg: 0 }));
  state.whole = { status: wholePieces.map(() => null) };
  state.expenses = [];
  state.splits = [];
  saveState();
  render();
}

// ── DATE ──────────────────────────────────────────────
document.getElementById('dateTag').textContent = new Date().toLocaleDateString('en-PH', {
  weekday:'short', year:'numeric', month:'short', day:'numeric'
});

// ── INIT ──────────────────────────────────────────────
render();
cloudLoad().then(cloudData => {
  if (cloudData) {
    Object.assign(state, cloudData);
    localStorage.setItem('chicktrack', JSON.stringify(state));
    render();
  }
});
</script>
