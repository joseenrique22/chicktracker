<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Sales Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2229;
    --border: #2a2f3a;
    --accent: #f5a623;
    --accent2: #ff6b35;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #f0f2f5;
    --muted: #6b7280;
    --label: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* HEADER */
  header {
    max-width: 960px;
    margin: 0 auto 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .date-tag {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* SUMMARY CARDS */
  .summary-grid {
    max-width: 960px;
    margin: 0 auto 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.cap::before { background: #4f8ef7; }
  .card.rev::before { background: var(--accent); }
  .card.pro::before { background: var(--green); }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .card.cap .card-value { color: #4f8ef7; }
  .card.rev .card-value { color: var(--accent); }
  .card.pro .card-value { color: var(--green); }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* SECTION */
  .section {
    max-width: 960px;
    margin: 0 auto 20px;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* PRODUCT ROW */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .product-card:hover { border-color: #3a3f4a; }

  .product-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    gap: 12px;
  }

  .product-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-green { background: rgba(46,204,113,0.15); color: var(--green); }
  .badge-yellow { background: rgba(245,166,35,0.15); color: var(--accent); }
  .badge-red { background: rgba(231,76,60,0.15); color: var(--red); }

  .product-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat { text-align: right; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
  .stat-value.profit { color: var(--green); }
  .stat-value.remaining { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 18px 14px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .progress-bar {
    height: 5px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  /* SOLD INPUT PANEL */
  .input-panel {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: none;
  }
  .input-panel.open { display: block; }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 100px;
  }
  .input-group label {
    font-size: 11px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    align-self: flex-end;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: var(--surface); color: var(--label); border: 1px solid var(--border); }
  .btn:hover { opacity: 0.85; }

  /* WHOLE CHICKEN PIECES */
  .pieces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  .piece-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .piece-item:hover { border-color: var(--accent); }
  .piece-item.sold {
    background: rgba(46,204,113,0.08);
    border-color: rgba(46,204,113,0.3);
  }
  .piece-item.sold .piece-price { color: var(--green); }
  .piece-item.sold .piece-label { color: var(--green); opacity: 0.7; }
  .piece-item.utang {
    background: rgba(255,165,0,0.10);
    border-color: rgba(255,165,0,0.4);
  }
  .piece-item.utang .piece-price { color: #f5a623; }
  .piece-item.utang .piece-label { color: #f5a623; opacity: 0.85; }
  .utang-tag {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 8px;
    color: #f5a623;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* PIECE MODAL */
  .piece-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .piece-modal-overlay.open { display: flex; }
  .piece-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px 18px;
    min-width: 240px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .piece-modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .piece-modal-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .piece-modal-btns { display: flex; gap: 10px; justify-content: center; }
  .pm-btn {
    flex: 1;
    padding: 11px 6px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pm-btn:hover { opacity: 0.85; }
  .pm-sold { background: var(--green); color: #fff; }
  .pm-utang { background: #f5a623; color: #fff; }
  .pm-cancel { background: var(--surface2); color: var(--muted); font-size: 12px; margin-top: 12px; width: 100%; padding: 8px; border-radius: 8px; border: none; cursor: pointer; }
  .pm-reset { background: rgba(255,80,80,0.15); color: #ff5252; font-size: 12px; margin-top: 6px; width: 100%; padding: 8px; border-radius: 8px; border: none; cursor: pointer; }

  .piece-price {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .piece-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .sold-tag {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 9px;
    color: var(--green);
    font-weight: 600;
  }

  /* EXPENSES */
  .expense-list { padding: 0 18px 4px; }
  .expense-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-name { font-size: 13px; color: var(--text); flex: 1; }
  .expense-amount { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--red); }
  .expense-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0 4px; transition: color 0.15s;
  }
  .expense-del:hover { color: var(--red); }
  .expense-add {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .expense-add input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 7px 10px; outline: none; transition: border-color 0.2s;
  }
  .expense-add input:focus { border-color: var(--accent); }
  .expense-add input.exp-name { flex: 2; min-width: 120px; }
  .expense-add input.exp-amt  { flex: 1; min-width: 90px; }

  /* PROFIT SPLIT */
  .split-card { padding: 18px 20px; }
  .split-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .split-shares { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .split-share {
    flex: 1; min-width: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .split-share-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .split-share-value { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
  .split-share.mine .split-share-value { color: var(--green); }
  .split-share.partner .split-share-value { color: var(--accent); }
  .split-accumulated {
    background: rgba(46,204,113,0.06);
    border: 1px solid rgba(46,204,113,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .split-accumulated-label { font-size: 12px; color: var(--muted); }
  .split-accumulated-value { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); }
  .split-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 15px;
    font-weight: 500; padding: 8px 12px; width: 80px; outline: none; transition: border-color 0.2s;
  }
  .split-input:focus { border-color: var(--accent); }
  .btn-split { background: var(--green); color: #fff; }
  .btn-reset-acc { background: rgba(231,76,60,0.15); color: var(--red); border: 1px solid rgba(231,76,60,0.2); font-size: 12px; padding: 6px 12px; }

  /* TOGGLE ARROW */
  .toggle-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .toggle-arrow.open { transform: rotate(180deg); }

  /* FOOTER NOTE */
  .footer-note {
    max-width: 960px;
    margin: 28px auto 0;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr; }
    .product-stats { gap: 12px; }
    .card-value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- PIECE STATUS MODAL -->
<div class="piece-modal-overlay" id="pieceModalOverlay" onclick="closePieceModal(event)">
  <div class="piece-modal">
    <div class="piece-modal-title" id="pieceModalTitle">Piece #1</div>
    <div class="piece-modal-sub" id="pieceModalSub">₱210.00 · 0.955 kg</div>
    <div class="piece-modal-btns">
      <button class="pm-btn pm-sold" onclick="setPieceStatus('sold')">✓ Sold</button>
      <button class="pm-btn pm-utang" onclick="setPieceStatus('utang')">📋 Utang</button>
    </div>
    <button class="pm-reset" id="pieceModalReset" onclick="setPieceStatus(null)" style="display:none">↩ Mark as Unsold</button>
    <button class="pm-cancel" onclick="closePieceModal()">Cancel</button>
  </div>
</div>

<!-- PART STATUS MODAL -->
<div class="piece-modal-overlay" id="partModalOverlay" onclick="closePartModal(event)">
  <div class="piece-modal">
    <div class="piece-modal-title" id="partModalTitle">Chicken Head</div>
    <div class="piece-modal-sub" id="partModalSub"></div>
    <div class="piece-modal-btns">
      <button class="pm-btn pm-sold" onclick="setPartStatus('sold')">✓ Sold</button>
      <button class="pm-btn pm-utang" onclick="setPartStatus('utang')">📋 Utang</button>
    </div>
    <button class="pm-cancel" onclick="closePartModal()">Cancel</button>
  </div>
</div>

<header>
  <div class="logo">🐔 Chick<span>Track</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="date-tag" id="dateTag"></div>
    <button class="btn btn-ghost" style="font-size:11px;padding:4px 12px;" onclick="resetData()">Reset</button>
  </div>
</header>

<!-- SUMMARY CARDS -->
<div class="summary-grid">
  <div class="card cap">
    <div class="card-label">Total Capital</div>
    <div class="card-value" id="totalCap">—</div>
    <div class="card-sub" id="totalCapSub"></div>
  </div>
  <div class="card rev">
    <div class="card-label">Revenue (Sold)</div>
    <div class="card-value" id="totalRev">—</div>
    <div class="card-sub" id="totalRevSub"></div>
  </div>
  <div class="card pro">
    <div class="card-label">Profit (Sold)</div>
    <div class="card-value" id="totalPro">—</div>
    <div class="card-sub" id="totalProSub"></div>
  </div>
</div>

<!-- CHICKEN PARTS -->
<div class="section">
  <div class="section-title">Chicken Parts</div>
  <div id="parts-list"></div>
</div>

<!-- WHOLE CHICKEN -->
<div class="section">
  <div class="section-title">Whole Chicken — 15 pcs · 14.46 kg · Tap piece to toggle sold</div>
  <div id="whole-section"></div>
</div>

<div class="section">
  <div class="section-title">Expenses</div>
  <div id="expenses-section"></div>
</div>

<div class="section">
  <div class="section-title">Profit Split</div>
  <div id="split-section"></div>
</div>

<div class="footer-note">Tap any part row to adjust · Tap piece to mark sold · ☁️ Syncs across devices</div>

<script>
// ── DATA ──────────────────────────────────────────────
const parts = [
  { id:'head',  name:'Chicken Head', kg:10,   buyPkg:60,  sellPkg:80,  emoji:'🐔' },
  { id:'feet',  name:'Chicken Feet', kg:10,   buyPkg:95,  sellPkg:125, emoji:'🦶' },
  { id:'proven',name:'Proven',       kg:10,   buyPkg:95,  sellPkg:140, emoji:'🫀' },
  { id:'fat',   name:'Chicken Fat',  kg:3,    buyPkg:75,  sellPkg:100, emoji:'🧈' },
  { id:'isaw',  name:'Isaw',         kg:10,   buyPkg:105, sellPkg:140, emoji:'🍢' },
];

const wholePieces = [
  { kg:0.955, cost:147.00, sell:210.00 },
  { kg:0.891, cost:137.20, sell:196.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.864, cost:133.00, sell:190.00 },
  { kg:0.886, cost:136.50, sell:195.00 },
  { kg:0.977, cost:150.50, sell:215.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.955, cost:147.00, sell:210.00 },
  { kg:0.909, cost:140.00, sell:200.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.932, cost:143.50, sell:205.00 },
  { kg:0.977, cost:150.50, sell:215.00 },
];

// ── FIREBASE SYNC ─────────────────────────────────────
const FB_URL = 'https://chicktracker-71f42-default-rtdb.asia-southeast1.firebasedatabase.app/data.json';

async function cloudLoad() {
  try {
    const res = await fetch(FB_URL);
    if (res.ok) {
      const data = await res.json();
      if (data) return data;
    }
  } catch(e) {}
  return null;
}

let saveTimer = null;
function saveState() {
  localStorage.setItem('chicktrack', JSON.stringify(state));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch(FB_URL, { method: 'PUT', body: JSON.stringify(state) }).catch(() => {});
  }, 800);
}

// ── STATE ─────────────────────────────────────────────
const defaultState = {
  parts: parts.map(p => ({ ...p, soldKg: 0, utangKg: 0 })),
  whole: { status: wholePieces.map(() => null) },
  expenses: [],
  splitPercent: 50,
  accumulatedProfit: 0,
};

let localSaved = null;
try { localSaved = JSON.parse(localStorage.getItem('chicktrack')); } catch(e) {}
const state = localSaved || JSON.parse(JSON.stringify(defaultState));
// migrate: ensure utangKg exists on all parts
if (state.parts) state.parts.forEach(p => { if (p.utangKg == null) p.utangKg = 0; });
if (state.splitPercent == null) state.splitPercent = 50;
if (state.accumulatedProfit == null) state.accumulatedProfit = 0;

// ── HELPERS ───────────────────────────────────────────
const fmt = n => '₱' + Number(n).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtKg = n => Number(n).toFixed(2) + ' kg';

function soldBadge(pct) {
  if (pct >= 100) return ['Sold Out', 'badge-green'];
  if (pct >= 50)  return ['Selling', 'badge-yellow'];
  return ['Available', 'badge-red'];
}

// ── RENDER PARTS ──────────────────────────────────────
function renderParts() {
  const container = document.getElementById('parts-list');
  container.innerHTML = '';

  state.parts.forEach((p, idx) => {
    const utangKg = p.utangKg || 0;
    const soldKg = p.soldKg || 0;
    const totalDoneKg = soldKg + utangKg;
    const soldProfit = soldKg * (p.sellPkg - p.buyPkg);
    const remaining = Math.max(0, p.kg - totalDoneKg);
    const pct = Math.min(100, (totalDoneKg / p.kg) * 100);
    const [label, badgeClass] = soldBadge(pct);
    const utangStat = utangKg > 0
      ? `<div class="stat"><div class="stat-label">Utang</div><div class="stat-value" style="color:#f5a623">${fmtKg(utangKg)}</div></div>`
      : '';

    const div = document.createElement('div');
    div.className = 'product-card';
    div.innerHTML = `
      <div class="product-header" onclick="togglePanel('panel-${p.id}', this)">
        <div class="product-name">
          <span>${p.emoji}</span>
          ${p.name}
          <span class="badge ${badgeClass}">${label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px">
          <div class="product-stats">
            <div class="stat">
              <div class="stat-label">Profit</div>
              <div class="stat-value profit">${fmt(soldProfit)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Remaining</div>
              <div class="stat-value remaining">${fmtKg(remaining)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Sold</div>
              <div class="stat-value">${fmtKg(soldKg)}</div>
            </div>
            ${utangStat}
          </div>
          <div class="toggle-arrow" id="arrow-${p.id}">▼</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>${fmtKg(soldKg)} sold · ${utangKg > 0 ? fmtKg(utangKg) + ' utang · ' : ''}${fmtKg(remaining)} remaining</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="input-panel" id="panel-${p.id}">
        <div class="input-row">
          <div class="input-group">
            <label>Kg Amount</label>
            <input type="number" id="sold-${p.id}" value="${totalDoneKg}" min="0" max="${p.kg}" step="0.1" placeholder="0.00">
          </div>
          <div class="input-group">
            <label>Buy/kg</label>
            <input type="number" id="buy-${p.id}" value="${p.buyPkg}" min="0" step="1">
          </div>
          <div class="input-group">
            <label>Sell/kg</label>
            <input type="number" id="sell-${p.id}" value="${p.sellPkg}" min="0" step="1">
          </div>
          <div class="input-group">
            <label>Total kg</label>
            <input type="number" id="total-${p.id}" value="${p.kg}" min="0" step="0.1">
          </div>
          <button class="btn btn-primary" onclick="updatePart('${p.id}')">Apply</button>
          <button class="btn btn-ghost" onclick="togglePanel('panel-${p.id}')">Close</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── RENDER WHOLE CHICKEN ──────────────────────────────
function renderWhole() {
  const container = document.getElementById('whole-section');
  const status = getWholeStatus();
  const soldCount = status.filter(s => s === 'sold').length;
  const utangCount = status.filter(s => s === 'utang').length;
  const doneCount = soldCount + utangCount;
  const totalCount = wholePieces.length;
  const soldRev = wholePieces.reduce((a, p, i) => a + (status[i] === 'sold' ? p.sell : 0), 0);
  const utangRev = wholePieces.reduce((a, p, i) => a + (status[i] === 'utang' ? p.sell : 0), 0);
  const soldCost = wholePieces.reduce((a, p, i) => a + (status[i] !== null ? p.cost : 0), 0);
  const soldProfit = soldRev - wholePieces.reduce((a, p, i) => a + (status[i] === 'sold' ? p.cost : 0), 0);
  const soldKg = wholePieces.reduce((a, p, i) => a + (status[i] !== null ? p.kg : 0), 0);
  const remainingKg = wholePieces.reduce((a, p, i) => a + (status[i] === null ? p.kg : 0), 0);
  const pct = Math.min(100, (doneCount / totalCount) * 100);
  const [label, badgeClass] = soldBadge(pct);

  const pieceTiles = wholePieces.map((p, i) => {
    const s = status[i];
    const cls = s === 'sold' ? 'sold' : s === 'utang' ? 'utang' : '';
    const tag = s === 'sold' ? '<span class="sold-tag">✓</span>'
              : s === 'utang' ? '<span class="utang-tag">UTANG</span>' : '';
    const profColor = s === 'sold' ? 'var(--green)' : s === 'utang' ? '#f5a623' : 'var(--accent)';
    return `
    <div class="piece-item ${cls}" onclick="openPieceModal(${i})">
      ${tag}
      <div class="piece-price">${fmt(p.sell)}</div>
      <div class="piece-label">#${i+1} · ${p.kg}kg</div>
      <div class="piece-label" style="color:${profColor}">+${fmt(p.sell - p.cost)}</div>
    </div>`;
  }).join('');

  const utangLine = utangCount > 0 ? `<div class="stat"><div class="stat-label">Utang</div><div class="stat-value" style="color:#f5a623">${utangCount} pcs · ${fmt(utangRev)}</div></div>` : '';

  container.innerHTML = `
    <div class="product-card">
      <div class="product-header">
        <div class="product-name">🐓 Whole Chicken <span class="badge ${badgeClass}">${label}</span></div>
        <div class="product-stats">
          <div class="stat"><div class="stat-label">Profit</div><div class="stat-value profit">${fmt(soldProfit)}</div></div>
          <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value remaining">${totalCount - doneCount} pcs · ${fmtKg(remainingKg)}</div></div>
          <div class="stat"><div class="stat-label">Sold</div><div class="stat-value">${soldCount} pcs · ${fmtKg(wholePieces.reduce((a,p,i)=>a+(status[i]==='sold'?p.kg:0),0))}</div></div>
          ${utangLine}
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>${soldCount} sold · ${utangCount} utang · ${totalCount - doneCount} remaining</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="pieces-grid">${pieceTiles}</div>
    </div>
  `;
}

// ── RENDER SUMMARY ────────────────────────────────────
function renderSummary() {
  // Parts
  const partsCap = state.parts.reduce((a,p) => a + p.kg * p.buyPkg, 0);
  const partsSoldRev = state.parts.reduce((a,p) => a + (p.soldKg||0) * p.sellPkg, 0);
  const partsSoldProfit = state.parts.reduce((a,p) => a + (p.soldKg||0) * (p.sellPkg - p.buyPkg), 0);

  // Whole
  const wst = getWholeStatus();
  const wholeCap = wholePieces.reduce((a,p) => a + p.cost, 0);
  const wholeSoldRev = wholePieces.reduce((a,p,i) => a + (wst[i] === 'sold' ? p.sell : 0), 0);
  const wholeSoldProfit = wholePieces.reduce((a,p,i) => a + (wst[i] === 'sold' ? p.sell - p.cost : 0), 0);
  const totalPotentialRevWhole = wholePieces.reduce((a,p) => a + p.sell, 0);

  const totalCap = partsCap + wholeCap;
  const totalRev = partsSoldRev + wholeSoldRev;
  const totalProfit = partsSoldProfit + wholeSoldProfit;

  const totalPotentialRev = state.parts.reduce((a,p) => a + p.kg * p.sellPkg, 0) + totalPotentialRevWhole;

  const totalExpenses = (state.expenses || []).reduce((a, e) => a + e.amount, 0);
  const netProfit = totalProfit - totalExpenses;

  document.getElementById('totalCap').textContent = fmt(totalCap);
  document.getElementById('totalCapSub').textContent = 'All items · 57.46 kg';
  document.getElementById('totalRev').textContent = fmt(totalRev);
  document.getElementById('totalRevSub').textContent = `of ${fmt(totalPotentialRev)} potential`;
  document.getElementById('totalPro').textContent = fmt(netProfit);
  document.getElementById('totalProSub').textContent = totalExpenses > 0
    ? `Gross ₱${totalProfit.toFixed(2)} − Exp ₱${totalExpenses.toFixed(2)}`
    : (netProfit > 0 ? '↑ Based on sold items' : 'No sales yet');
}

function renderExpenses() {
  const container = document.getElementById('expenses-section');
  const expenses = state.expenses || [];
  const total = expenses.reduce((a, e) => a + e.amount, 0);

  const rows = expenses.length
    ? expenses.map((e, i) => `
        <div class="expense-row">
          <span class="expense-name">${e.name}</span>
          <span class="expense-amount">−${fmt(e.amount)}</span>
          <button class="expense-del" onclick="deleteExpense(${i})">×</button>
        </div>`).join('')
    : '<div style="padding:10px 0;font-size:12px;color:var(--muted);">No expenses yet</div>';

  container.innerHTML = `
    <div class="product-card">
      <div class="product-header" style="cursor:default">
        <div class="product-name">💸 Expenses</div>
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value" style="color:var(--red)">${fmt(total)}</div>
        </div>
      </div>
      <div class="expense-list">${rows}</div>
      <div class="expense-add">
        <input class="exp-name" id="exp-name" type="text" placeholder="Expense name (e.g. Transport)">
        <input class="exp-amt"  id="exp-amt"  type="number" placeholder="Amount" min="0" step="1">
        <button class="btn btn-primary" style="padding:7px 14px" onclick="addExpense()">Add</button>
      </div>
    </div>
  `;
}

function getCurrentNetProfit() {
  const partsSoldProfit = state.parts.reduce((a,p) => a + (p.soldKg||0) * (p.sellPkg - p.buyPkg), 0);
  const wst = getWholeStatus();
  const wholeSoldProfit = wholePieces.reduce((a,p,i) => a + (wst[i] === 'sold' ? p.sell - p.cost : 0), 0);
  const totalExpenses = (state.expenses || []).reduce((a, e) => a + e.amount, 0);
  return partsSoldProfit + wholeSoldProfit - totalExpenses;
}

function renderProfitSplit() {
  const container = document.getElementById('split-section');
  if (!container) return;
  const splitPercent = state.splitPercent != null ? state.splitPercent : 50;
  const accumulated = state.accumulatedProfit || 0;
  const netProfit = getCurrentNetProfit();
  const partnerShare = netProfit * (splitPercent / 100);
  const myShare = netProfit - partnerShare;

  container.innerHTML = `
    <div class="product-card">
      <div class="split-card">
        <div class="split-row">
          <span style="font-size:13px;color:var(--label);">Partner's share:</span>
          <input class="split-input" id="split-pct" type="number" min="0" max="100" step="1" value="${splitPercent}">
          <span style="font-size:13px;color:var(--label);">%</span>
          <button class="btn btn-split" onclick="splitProfit()">Split Now</button>
          <button class="btn btn-ghost btn-reset-acc" onclick="resetAccumulated()">Reset Total</button>
        </div>
        <div class="split-shares">
          <div class="split-share mine">
            <div class="split-share-label">My Share (${100 - splitPercent}%)</div>
            <div class="split-share-value">${fmt(myShare)}</div>
          </div>
          <div class="split-share partner">
            <div class="split-share-label">Partner's Share (${splitPercent}%)</div>
            <div class="split-share-value">${fmt(partnerShare)}</div>
          </div>
        </div>
        <div class="split-accumulated">
          <div>
            <div class="split-accumulated-label">Total Accumulated (My Share)</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">Running total from all splits</div>
          </div>
          <div class="split-accumulated-value">${fmt(accumulated)}</div>
        </div>
      </div>
    </div>
  `;
}

function splitProfit() {
  const splitPercent = parseFloat(document.getElementById('split-pct').value) || 0;
  state.splitPercent = splitPercent;
  const netProfit = getCurrentNetProfit();
  const myShare = netProfit * ((100 - splitPercent) / 100);
  state.accumulatedProfit = (state.accumulatedProfit || 0) + myShare;
  saveState();
  renderProfitSplit();
}

function resetAccumulated() {
  if (!confirm('Reset accumulated profit total to zero?')) return;
  state.accumulatedProfit = 0;
  saveState();
  renderProfitSplit();
}

function render() {
  renderParts();
  renderWhole();
  renderExpenses();
  renderSummary();
  renderProfitSplit();
}

// ── INTERACTIONS ──────────────────────────────────────
function addExpense() {
  const name = document.getElementById('exp-name').value.trim();
  const amount = parseFloat(document.getElementById('exp-amt').value) || 0;
  if (!name || amount <= 0) return;
  if (!state.expenses) state.expenses = [];
  state.expenses.push({ name, amount });
  saveState();
  renderExpenses();
  renderSummary();
}

function deleteExpense(i) {
  state.expenses.splice(i, 1);
  saveState();
  renderExpenses();
  renderSummary();
}

function togglePanel(id, headerEl) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.contains('open');
  // Close all panels
  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.toggle-arrow').forEach(a => a.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    const arrowId = id.replace('panel-', 'arrow-');
    const arrow = document.getElementById(arrowId);
    if (arrow) arrow.classList.add('open');
  }
}

let _pendingPartUpdate = null;

function updatePart(id) {
  const idx = state.parts.findIndex(p => p.id === id);
  if (idx === -1) return;
  const kgAmt = parseFloat(document.getElementById('sold-'+id).value) || 0;
  const buyPkg = parseFloat(document.getElementById('buy-'+id).value) || 0;
  const sellPkg = parseFloat(document.getElementById('sell-'+id).value) || 0;
  const totalKg = parseFloat(document.getElementById('total-'+id).value) || 0;
  _pendingPartUpdate = { id, idx, kgAmt: Math.min(kgAmt, totalKg), buyPkg, sellPkg, totalKg };
  const p = state.parts[idx];
  const profit = _pendingPartUpdate.kgAmt * (sellPkg - buyPkg);
  document.getElementById('partModalTitle').textContent = p.emoji + ' ' + p.name;
  document.getElementById('partModalSub').textContent = `${fmtKg(_pendingPartUpdate.kgAmt)} · Est. Profit +${fmt(profit)}`;
  document.getElementById('partModalOverlay').classList.add('open');
}

function closePartModal(e) {
  if (e && e.target !== document.getElementById('partModalOverlay')) return;
  document.getElementById('partModalOverlay').classList.remove('open');
  _pendingPartUpdate = null;
}

function setPartStatus(status) {
  if (!_pendingPartUpdate) return;
  const { id, idx, kgAmt, buyPkg, sellPkg, totalKg } = _pendingPartUpdate;
  state.parts[idx].buyPkg = buyPkg;
  state.parts[idx].sellPkg = sellPkg;
  state.parts[idx].kg = totalKg;
  if (status === 'sold') {
    state.parts[idx].soldKg = kgAmt;
    state.parts[idx].utangKg = 0;
  } else {
    state.parts[idx].utangKg = kgAmt;
    state.parts[idx].soldKg = 0;
  }
  document.getElementById('partModalOverlay').classList.remove('open');
  _pendingPartUpdate = null;
  saveState();
  render();
  setTimeout(() => togglePanel('panel-'+id), 10);
}

function getWholeStatus() {
  // migrate old boolean sold array
  if (state.whole.sold && !state.whole.status) {
    state.whole.status = state.whole.sold.map(v => v ? 'sold' : null);
    delete state.whole.sold;
  }
  if (!state.whole.status) state.whole.status = wholePieces.map(() => null);
  return state.whole.status;
}

let _modalIdx = null;
function openPieceModal(i) {
  _modalIdx = i;
  const p = wholePieces[i];
  const s = getWholeStatus()[i];
  document.getElementById('pieceModalTitle').textContent = `Piece #${i+1}`;
  document.getElementById('pieceModalSub').textContent = `${fmt(p.sell)} · ${p.kg} kg · Profit +${fmt(p.sell - p.cost)}`;
  document.getElementById('pieceModalReset').style.display = s ? 'block' : 'none';
  document.getElementById('pieceModalOverlay').classList.add('open');
}
function closePieceModal(e) {
  if (e && e.target !== document.getElementById('pieceModalOverlay')) return;
  document.getElementById('pieceModalOverlay').classList.remove('open');
  _modalIdx = null;
}
function setPieceStatus(s) {
  if (_modalIdx === null) return;
  getWholeStatus();
  state.whole.status[_modalIdx] = s;
  document.getElementById('pieceModalOverlay').classList.remove('open');
  _modalIdx = null;
  saveState(); renderWhole(); renderSummary();
}

function resetData() {
  if (!confirm('Reset all sales data back to zero?')) return;
  state.parts = parts.map(p => ({ ...p, soldKg: 0, utangKg: 0 }));
  state.whole = { status: wholePieces.map(() => null) };
  state.expenses = [];
  state.accumulatedProfit = 0;
  saveState();
  render();
}

// ── DATE ──────────────────────────────────────────────
document.getElementById('dateTag').textContent = new Date().toLocaleDateString('en-PH', {
  weekday:'short', year:'numeric', month:'short', day:'numeric'
});

// ── INIT ──────────────────────────────────────────────
render();
cloudLoad().then(cloudData => {
  if (cloudData) {
    Object.assign(state, cloudData);
    localStorage.setItem('chicktrack', JSON.stringify(state));
    render();
  }
});
</script>
</body>
</html>
